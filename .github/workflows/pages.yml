name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emacs
        run: sudo apt-get install -y emacs-nox

      - name: Clone one.el dependencies
        run: |
          git clone --depth=1 https://github.com/tonyaldon/jack.git jack
          git clone --depth=1 https://github.com/hniksic/emacs-htmlize.git emacs-htmlize
          git clone --depth=1 https://github.com/tonyaldon/one.el.git one.el

      - name: Build site with Emacs
        run: emacs --batch --load build.el

      - name: Add .nojekyll
        run: touch public/.nojekyll

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - uses: actions/deploy-pages@v4
        id: deployment
